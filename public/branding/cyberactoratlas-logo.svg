<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Cyber Actor Atlas globe logo</title>
  <desc id="desc">A dark square logo with a glowing globe, grid lines, and colored nodes.</desc>
  <defs>
    <radialGradient id="bg" cx="40%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#101a33"/>
      <stop offset="55%" stop-color="#0b1325"/>
      <stop offset="100%" stop-color="#060b17"/>
    </radialGradient>
    <radialGradient id="sphere" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#243862"/>
      <stop offset="58%" stop-color="#111d36"/>
      <stop offset="100%" stop-color="#07111f"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#57c7ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#57c7ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5b57" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#ff5b57" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orangeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8a5c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff8a5c" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <circle cx="256" cy="256" r="170"/>
    </clipPath>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="28" fill="url(#bg)"/>

  <g filter="url(#softGlow)">
    <circle cx="256" cy="256" r="170" fill="url(#sphere)"/>
    <circle cx="256" cy="256" r="170" fill="none" stroke="#57c7ff" stroke-width="1.8" opacity="0.85"/>
    <circle cx="256" cy="256" r="170" fill="none" stroke="#57c7ff" stroke-opacity="0.05" stroke-width="18"/>
  </g>

  <g clip-path="url(#clip)" fill="none" stroke="#57c7ff" opacity="0.28" stroke-width="1.1">
    <ellipse cx="256" cy="256" rx="170" ry="34"/>
    <ellipse cx="256" cy="256" rx="170" ry="70"/>
    <ellipse cx="256" cy="256" rx="170" ry="108"/>
    <ellipse cx="256" cy="256" rx="170" ry="144"/>
    <ellipse cx="256" cy="256" rx="34" ry="170"/>
    <ellipse cx="256" cy="256" rx="68" ry="170"/>
    <ellipse cx="256" cy="256" rx="104" ry="170"/>
    <ellipse cx="256" cy="256" rx="142" ry="170"/>
    <path d="M86 256H426"/>
    <path d="M256 86V426"/>
  </g>

  <g clip-path="url(#clip)" opacity="0.47" fill="none" stroke="#57c7ff" stroke-width="1.2">
    <path d="M121 167C178 186 334 186 391 167"/>
    <path d="M112 220C180 236 332 236 400 220"/>
    <path d="M110 292C180 276 332 276 402 292"/>
    <path d="M122 346C180 328 332 328 390 346"/>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="184" cy="228" r="16" fill="#57c7ff"/>
    <circle cx="184" cy="228" r="30" fill="url(#blueGlow)" opacity="0.45"/>
    <circle cx="228" cy="186" r="20" fill="#ff5b57"/>
    <circle cx="228" cy="186" r="36" fill="url(#redGlow)" opacity="0.43"/>
    <circle cx="286" cy="192" r="24" fill="#ff5b57"/>
    <circle cx="286" cy="192" r="42" fill="url(#redGlow)" opacity="0.4"/>
    <circle cx="254" cy="254" r="14" fill="#ff8a5c"/>
    <circle cx="254" cy="254" r="28" fill="url(#orangeGlow)" opacity="0.36"/>
    <circle cx="304" cy="266" r="13" fill="#ff8a5c"/>
    <circle cx="304" cy="266" r="26" fill="url(#orangeGlow)" opacity="0.35"/>
  </g>

  <g opacity="0.52" fill="none" stroke-linecap="round" stroke-dasharray="6 8">
    <path d="M184 228C206 222 220 208 228 186" stroke="#57c7ff" stroke-width="1.5"/>
    <path d="M228 186C240 202 246 229 254 254" stroke="#ff5b57" stroke-width="1.3"/>
    <path d="M184 228C204 244 228 252 254 254" stroke="#57c7ff" stroke-width="1.1"/>
    <path d="M286 192C294 214 300 243 304 266" stroke="#ff8a5c" stroke-width="1.1"/>
  </g>

  <circle cx="256" cy="256" r="170" fill="none" stroke="#57c7ff" stroke-opacity="0.15" stroke-width="1.1"/>
  <circle cx="256" cy="256" r="2.5" fill="#dff6ff"/>
</svg>
