<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <!-- Deep dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1525;stop-opacity:1" />
    </linearGradient>

    <!-- Globe highlight -->
    <radialGradient id="globeGlow" cx="40%" cy="35%" r="55%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0d2040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060e1f;stop-opacity:1" />
    </radialGradient>

    <!-- Accent glow for nodes -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="redNodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ef5350;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ef5350;stop-opacity:0" />
    </radialGradient>

    <!-- Clip for globe -->
    <clipPath id="globeClip">
      <circle cx="95" cy="110" r="72" />
    </clipPath>

    <!-- Subtle outer glow filter -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="220" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid texture overlay -->
  <line x1="0" y1="40" x2="600" y2="40" stroke="#ffffff" stroke-width="0.2" opacity="0.04"/>
  <line x1="0" y1="80" x2="600" y2="80" stroke="#ffffff" stroke-width="0.2" opacity="0.04"/>
  <line x1="0" y1="120" x2="600" y2="120" stroke="#ffffff" stroke-width="0.2" opacity="0.04"/>
  <line x1="0" y1="160" x2="600" y2="160" stroke="#ffffff" stroke-width="0.2" opacity="0.04"/>
  <line x1="0" y1="200" x2="600" y2="200" stroke="#ffffff" stroke-width="0.2" opacity="0.04"/>
  <line x1="80" y1="0" x2="80" y2="220" stroke="#ffffff" stroke-width="0.2" opacity="0.04"/>
  <line x1="160" y1="0" x2="160" y2="220" stroke="#ffffff" stroke-width="0.2" opacity="0.04"/>
  <line x1="240" y1="0" x2="240" y2="220" stroke="#ffffff" stroke-width="0.2" opacity="0.04"/>
  <line x1="320" y1="0" x2="320" y2="220" stroke="#ffffff" stroke-width="0.2" opacity="0.04"/>
  <line x1="400" y1="0" x2="400" y2="220" stroke="#ffffff" stroke-width="0.2" opacity="0.04"/>
  <line x1="480" y1="0" x2="480" y2="220" stroke="#ffffff" stroke-width="0.2" opacity="0.04"/>
  <line x1="560" y1="0" x2="560" y2="220" stroke="#ffffff" stroke-width="0.2" opacity="0.04"/>

  <!-- =========== GLOBE MARK =========== -->

  <!-- Globe base fill -->
  <circle cx="95" cy="110" r="72" fill="url(#globeGlow)" />

  <!-- Globe outer ring -->
  <circle cx="95" cy="110" r="72" fill="none" stroke="#4fc3f7" stroke-width="1.2" opacity="0.5"/>

  <!-- Latitude lines (clipped) -->
  <g clip-path="url(#globeClip)" opacity="0.25" stroke="#4fc3f7" stroke-width="0.7" fill="none">
    <ellipse cx="95" cy="110" rx="72" ry="14"/>
    <ellipse cx="95" cy="110" rx="72" ry="35"/>
    <ellipse cx="95" cy="110" rx="72" ry="58"/>
    <!-- equator slightly stronger -->
  </g>

  <!-- Equator (slightly stronger) -->
  <g clip-path="url(#globeClip)" opacity="0.45" stroke="#4fc3f7" stroke-width="0.9" fill="none">
    <line x1="23" y1="110" x2="167" y2="110"/>
  </g>

  <!-- Longitude lines (clipped) -->
  <g clip-path="url(#globeClip)" opacity="0.22" stroke="#4fc3f7" stroke-width="0.7" fill="none">
    <ellipse cx="95" cy="110" rx="20" ry="72"/>
    <ellipse cx="95" cy="110" rx="44" ry="72"/>
    <ellipse cx="95" cy="110" rx="62" ry="72"/>
  </g>

  <!-- Prime meridian (slightly stronger) -->
  <g clip-path="url(#globeClip)" opacity="0.4" stroke="#4fc3f7" stroke-width="0.9" fill="none">
    <line x1="95" y1="38" x2="95" y2="182"/>
  </g>

  <!-- Threat actor nodes on globe -->
  <!-- Node 1 — East Asia region -->
  <circle cx="125" cy="88" r="5" fill="#ef5350" opacity="0.9"/>
  <circle cx="125" cy="88" r="10" fill="url(#redNodeGlow)" opacity="0.5"/>

  <!-- Node 2 — Eastern Europe -->
  <circle cx="80" cy="82" r="4" fill="#ef5350" opacity="0.85"/>
  <circle cx="80" cy="82" r="8" fill="url(#redNodeGlow)" opacity="0.45"/>

  <!-- Node 3 — Middle East / North Africa -->
  <circle cx="108" cy="108" r="3.5" fill="#ff8a65" opacity="0.9"/>
  <circle cx="108" cy="108" r="7" fill="url(#redNodeGlow)" opacity="0.4"/>

  <!-- Node 4 — North America -->
  <circle cx="55" cy="95" r="3" fill="#4fc3f7" opacity="0.8"/>
  <circle cx="55" cy="95" r="6" fill="url(#nodeGlow)" opacity="0.4"/>

  <!-- Node 5 — South/Southeast Asia -->
  <circle cx="138" cy="115" r="3" fill="#ff8a65" opacity="0.8"/>

  <!-- Connection arcs between nodes -->
  <!-- East Asia → Eastern Europe -->
  <path d="M125,88 Q102,60 80,82" stroke="#ef5350" stroke-width="0.8" fill="none" opacity="0.4" stroke-dasharray="3,3"/>
  <!-- East Asia → Middle East -->
  <path d="M125,88 Q118,98 108,108" stroke="#ef5350" stroke-width="0.6" fill="none" opacity="0.3" stroke-dasharray="2,3"/>
  <!-- Eastern Europe → North America -->
  <path d="M80,82 Q65,70 55,95" stroke="#4fc3f7" stroke-width="0.6" fill="none" opacity="0.3" stroke-dasharray="2,3"/>

  <!-- Crosshair reticle (subtle) on main node -->
  <circle cx="125" cy="88" r="14" fill="none" stroke="#ef5350" stroke-width="0.5" opacity="0.3" stroke-dasharray="2,4"/>
  <line x1="125" y1="70" x2="125" y2="76" stroke="#ef5350" stroke-width="0.7" opacity="0.5"/>
  <line x1="125" y1="100" x2="125" y2="106" stroke="#ef5350" stroke-width="0.7" opacity="0.5"/>
  <line x1="107" y1="88" x2="113" y2="88" stroke="#ef5350" stroke-width="0.7" opacity="0.5"/>
  <line x1="137" y1="88" x2="143" y2="88" stroke="#ef5350" stroke-width="0.7" opacity="0.5"/>

  <!-- Globe rim accent -->
  <circle cx="95" cy="110" r="72" fill="none" stroke="#4fc3f7" stroke-width="0.6" opacity="0.15"/>

  <!-- =========== WORDMARK =========== -->

  <!-- CYBER -->
  <text
    x="192" y="97"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="42"
    font-weight="700"
    letter-spacing="6"
    fill="#e8f4fd"
    filter="url(#textGlow)"
    opacity="0.95"
  >CYBER</text>

  <!-- ACTOR in accent cyan -->
  <text
    x="192" y="143"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="42"
    font-weight="700"
    letter-spacing="6"
    fill="#4fc3f7"
    filter="url(#textGlow)"
    opacity="0.95"
  >ACTOR</text>

  <!-- Divider line between ACTOR and ATLAS -->
  <line x1="192" y1="152" x2="545" y2="152" stroke="#4fc3f7" stroke-width="0.7" opacity="0.4"/>

  <!-- ATLAS — smaller, spaced, below divider -->
  <text
    x="194" y="171"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="16"
    font-weight="400"
    letter-spacing="14"
    fill="#7ec8e3"
    opacity="0.7"
  >ATLAS</text>

  <!-- Tagline -->
  <text
    x="194" y="191"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="9"
    font-weight="400"
    letter-spacing="2.5"
    fill="#4a7a96"
    opacity="0.85"
  >OPEN-SOURCE · GEOGRAPHIC THREAT INTELLIGENCE</text>

  <!-- Small version marker, top right -->
  <text x="565" y="22" font-family="'Courier New', monospace" font-size="8" fill="#4fc3f7" opacity="0.3" text-anchor="end">v1.0</text>

  <!-- Corner accent marks -->
  <path d="M14,14 L14,28 M14,14 L28,14" stroke="#4fc3f7" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M586,14 L586,28 M586,14 L572,14" stroke="#4fc3f7" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M14,206 L14,192 M14,206 L28,206" stroke="#4fc3f7" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M586,206 L586,192 M586,206 L572,206" stroke="#4fc3f7" stroke-width="1" opacity="0.3" fill="none"/>
</svg>
