    <circle cx="168" cy="220" r="128" fill="none" stroke="#57c7ff" stroke-width="2.2" opacity="0.72"/>
    <circle cx="168" cy="220" r="128" fill="none" stroke="#57c7ff" stroke-opacity="0.06" stroke-width="20"/>
    </g>

    <g clip-path="url(#globeClip)" opacity="0.34" fill="none" stroke="#57c7ff" stroke-width="1.2">
