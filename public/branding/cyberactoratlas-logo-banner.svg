  <text x="354" y="344" fill="#6b86a8" font-family="Avenir Next, Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="4.5">OPEN-SOURCE   •   GEOGRAPHIC THREAT INTELLIGENCE</text>

