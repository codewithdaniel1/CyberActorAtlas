  <circle cx="1010" cy="98" r="2.3" fill="#57c7ff" opacity="0.75"/>
  <circle cx="1040" cy="128" r="1.8" fill="#ff8a5c" opacity="0.7"/>
  <circle cx="1075" cy="92" r="1.6" fill="#edf6ff" opacity="0.7"/>
  <circle cx="990" cy="110" r="1.4" fill="#57c7ff" opacity="0.5"/>
