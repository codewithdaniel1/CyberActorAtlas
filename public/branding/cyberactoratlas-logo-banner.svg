      <circle cx="185" cy="246" r="22" fill="#ff8a5c"/>
      <circle cx="185" cy="246" r="40" fill="url(#orangeGlow)" opacity="0.35"/>
    </g>

    <g opacity="0.55" stroke-linecap="round" stroke-dasharray="5 8" fill="none">
      <path d="M128 186C150 179 174 168 212 162" stroke="#57c7ff" stroke-width="1.6"/>
      <path d="M152 152C170 173 176 198 185 246" stroke="#ff5b57" stroke-width="1.3"/>
      <path d="M128 186C145 205 164 226 235 218" stroke="#57c7ff" stroke-width="1.2"/>
    </g>

    <circle cx="168" cy="220" r="128" fill="none" stroke="#57c7ff" stroke-opacity="0.14" stroke-width="1.2"/>
    <circle cx="168" cy="220" r="2.6" fill="#dff6ff"/>
  </g>

  <g filter="url(#textShadow)">
    <text x="354" y="200" font-family="Avenir Next, Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="0.4">
      <tspan fill="#edf6ff">CYBER</tspan>
      <tspan dx="18" fill="#57c7ff">ACTOR</tspan>
      <tspan dx="18" fill="#8fb4d8" font-size="72" font-weight="600" letter-spacing="0.4">ATLAS</tspan>
    </text>
