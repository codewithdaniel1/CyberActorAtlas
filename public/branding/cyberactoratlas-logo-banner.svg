<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">Cyber Actor Atlas banner logo</title>
  <desc id="desc">Dark banner logo with a glowing globe, colored nodes, and the Cyber Actor Atlas wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060b17"/>
      <stop offset="55%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#0e1830"/>
    </linearGradient>
    <radialGradient id="glow" cx="38%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#12253f"/>
      <stop offset="52%" stop-color="#0b1730"/>
      <stop offset="100%" stop-color="#05101f"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#57c7ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#57c7ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b5e" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ff6b5e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orangeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9a62" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff9a62" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="globeClip">
      <circle cx="168" cy="220" r="128"/>
    </clipPath>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000814" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="1200" height="440" rx="18" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1197" height="437" rx="16.5" fill="none" stroke="#63c7ff" stroke-opacity="0.12" stroke-width="3"/>

  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <path d="M0 70H1200"/>
    <path d="M0 140H1200"/>
    <path d="M0 210H1200"/>
    <path d="M0 280H1200"/>
    <path d="M0 350H1200"/>
    <path d="M110 0V440"/>
    <path d="M220 0V440"/>
    <path d="M330 0V440"/>
    <path d="M440 0V440"/>
    <path d="M550 0V440"/>
    <path d="M660 0V440"/>
    <path d="M770 0V440"/>
    <path d="M880 0V440"/>
    <path d="M990 0V440"/>
    <path d="M1100 0V440"/>
