    <g filter="url(#softGlow)">
      <circle cx="128" cy="186" r="19" fill="#57c7ff"/>
      <circle cx="128" cy="186" r="34" fill="url(#blueGlow)" opacity="0.45"/>
      <circle cx="152" cy="152" r="24" fill="#ff5b57"/>
      <circle cx="152" cy="152" r="42" fill="url(#redGlow)" opacity="0.4"/>
      <circle cx="212" cy="162" r="29" fill="#ff5b57"/>
      <circle cx="212" cy="162" r="48" fill="url(#redGlow)" opacity="0.38"/>
      <circle cx="235" cy="218" r="16" fill="#ff8a5c"/>
