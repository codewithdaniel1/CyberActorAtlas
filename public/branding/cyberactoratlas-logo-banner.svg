      <ellipse cx="168" cy="220" rx="28" ry="128"/>
      <ellipse cx="168" cy="220" rx="56" ry="128"/>
      <ellipse cx="168" cy="220" rx="86" ry="128"/>
      <ellipse cx="168" cy="220" rx="108" ry="128"/>
      <path d="M40 220H296"/>
      <path d="M168 92V348"/>
